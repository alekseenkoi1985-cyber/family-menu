name: Deploy to VPS
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 10m
          script: |
            set -e

            # Node.js 18
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
              apt-get install -y nodejs
            fi

            # PM2
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            # Nginx
            if ! command -v nginx &> /dev/null; then
              apt-get update && apt-get install -y nginx
            fi

            # Git
            if ! command -v git &> /dev/null; then
              apt-get install -y git
            fi

            # Клонирование или обновление репозитория
            if [ -d "/root/family-menu" ]; then
              cd /root/family-menu
              git pull origin main
            else
              git clone https://github.com/alekseenkoi1985-cyber/family-menu.git /root/family-menu
              cd /root/family-menu
            fi

            # Зависимости
            npm install --production

            # Перезапуск через PM2
            pm2 stop family-menu 2>/dev/null || true
            pm2 delete family-menu 2>/dev/null || true
            pm2 start /root/family-menu/ecosystem.config.js
            pm2 save
            pm2 startup systemd -u root --hp /root 2>/dev/null || true

            # Nginx конфиг
            cat > /etc/nginx/sites-available/family-menu << 'NGINXEOF'
            server {
                listen 80 default_server;
                server_name _;
                client_max_body_size 10M;

                location / {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            NGINXEOF

            ln -sf /etc/nginx/sites-available/family-menu /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl restart nginx
            systemctl enable nginx

            echo "=== Деплой завершён успешно ==="
            pm2 status
