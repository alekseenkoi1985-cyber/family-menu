<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Семейное Меню</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1 id="page-title">Семейное Меню</h1>
            <nav id="main-nav" class="hidden">
                <button onclick="router.go('menu')">🍴 Меню</button>
                <button onclick="router.go('vote')">🗳️ Голос</button>
                <button onclick="router.go('pantry')">📦 Склад</button>
                <button onclick="router.go('shopping')">🛒 Покупки</button>
                <button onclick="router.go('admin')" id="nav-admin" class="hidden">⚙️ Админ</button>
            </nav>
        </header>

        <main id="content">
            <!-- Сюда рендерится контент -->
        </main>

        <div id="loader" class="hidden">Загрузка...</div>
    </div>

    <!-- Шаблоны страниц -->
    <template id="tpl-login">
        <div class="page-login">
            <h2>Кто зашел?</h2>
            <div class="user-grid">
                <button onclick="auth.select('Ирина')">Ирина (Админ)</button>
                <button onclick="auth.login('Илья')">Илья</button>
                <button onclick="auth.login('Ульяна')">Ульяна</button>
                <button onclick="auth.login('Николай')">Николай</button>
            </div>
            <div id="pin-area" class="hidden">
                <input type="password" id="pin-input" placeholder="Введите PIN" inputmode="numeric">
                <button onclick="auth.login('Ирина')">Войти</button>
            </div>
        </div>
    </template>

    <template id="tpl-pantry">
        <div class="page-pantry">
            <h2>Кладовая</h2>
            <div class="add-item" id="admin-pantry-controls">
                <input type="text" id="p-name" placeholder="Продукт">
                <input type="number" id="p-qty" placeholder="Кол-во">
                <input type="text" id="p-unit" placeholder="Ед.изм">
                <button onclick="pantry.add()">Добавить</button>
            </div>
            <ul id="pantry-list"></ul>
        </div>
    </template>

    <template id="tpl-vote">
        <div class="page-vote">
            <h2>Голосование за меню</h2>
            <div id="vote-options" class="options-grid"></div>
        </div>
    </template>

    <template id="tpl-shopping">
        <div class="page-shopping">
            <h2>Список покупок</h2>
            <div class="shopping-legend">
                <span class="tag in-home">Уже есть</span>
                <span class="tag need-buy">Купить</span>
            </div>
            <ul id="shopping-list"></ul>
        </div>
    </template>

    <template id="tpl-admin">
        <div class="page-admin">
            <h2>Панель управления</h2>
            <button class="btn-main" onclick="admin.generateMenu()">Сгенерировать 4 варианта меню</button>
            <div id="admin-status"></div>
            <div class="stats">
                <p>Рецептов в базе: <span id="stat-recipes">...</span></p>
                <p>Погода: <span id="stat-weather">...</span></p>
            </div>
        </div>
    </template>

    <script src="/js/app.js"></script>
</body>
</html>
