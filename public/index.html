<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Семейное Меню</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1 id="page-title">🍴 Семейное Меню</h1>
            <nav id="main-nav" class="hidden">
                <button onclick="router.go('menu')" title="Меню">📅</button>
                <button onclick="router.go('vote')" title="Голос">🗳️</button>
                <button onclick="router.go('pantry')" title="Склад">📦</button>
                <button onclick="router.go('shopping')" title="Покупки">🛒</button>
                <button onclick="router.go('admin')" id="nav-admin" class="hidden" title="Админ">⚙️</button>
                <button onclick="api.logout()" title="Выход">🚪</button>
            </nav>
        </header>

        <main id="content">
            <!-- Сюда рендерится контент -->
        </main>

        <div id="loader" class="hidden">Загрузка...</div>
        <div id="toast" class="hidden"></div>
    </div>

    <!-- Templates -->
    <template id="tpl-login">
        <div class="page login-page">
            <h2>Кто ты сегодня?</h2>
            <div class="user-grid">
                <div class="user-card" onclick="ui.showPin('Ирина')">👸 Ирина (Админ)</div>
                <div class="user-card" onclick="api.login('Илья')">👦 Илья</div>
                <div class="user-card" onclick="api.login('Ульяна')">👧 Ульяна</div>
                <div class="user-card" onclick="api.login('Николай')">👨 Николай</div>
            </div>
            <div id="pin-modal" class="hidden">
                <div class="modal-content">
                    <h3>Введите PIN для Ирины</h3>
                    <input type="password" id="pin-input" placeholder="****" inputmode="numeric">
                    <button onclick="api.login('Ирина', document.getElementById('pin-input').value)">Войти</button>
                    <button onclick="ui.hidePin()">Отмена</button>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-pantry">
        <div class="page">
            <h2>📦 Кладовая</h2>
            <div id="pantry-admin" class="hidden">
                <div class="form-group">
                    <input type="text" id="p-name" placeholder="Продукт">
                    <input type="number" id="p-qty" placeholder="Кол-во">
                    <input type="text" id="p-unit" placeholder="Ед. изм.">
                    <button onclick="pantry.add()">Добавить</button>
                </div>
            </div>
            <div id="pantry-list" class="list"></div>
        </div>
    </template>

    <template id="tpl-vote">
        <div class="page">
            <h2>🗳️ Голосование за меню</h2>
            <p>Выберите лучший вариант на неделю:</p>
            <div id="vote-options" class="vote-grid"></div>
        </div>
    </template>

    <template id="tpl-menu">
        <div class="page">
            <h2>📅 Текущее Меню</h2>
            <div id="active-menu" class="menu-container"></div>
        </div>
    </template>

    <template id="tpl-shopping">
        <div class="page">
            <h2>🛒 Список покупок</h2>
            <div id="shopping-list" class="list"></div>
        </div>
    </template>

    <template id="tpl-admin">
        <div class="page">
            <h2>⚙️ Админ-панель</h2>
            <button class="btn-large" onclick="admin.generateMenu()">🎲 Сгенерировать варианты меню</button>
            <hr>
            <h3>Управление рецептами</h3>
            <div id="admin-recipes-list"></div>
        </div>
    </template>

    <script src="/js/app.js"></script>
</body>
</html>
